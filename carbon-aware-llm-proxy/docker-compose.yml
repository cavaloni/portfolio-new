# Development Docker Compose Configuration
# For local development with hot reload

services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: carbon-aware-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - carbon-aware-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Backend API Service
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile.dev
    container_name: carbon-aware-backend-dev
    environment:
      NODE_ENV: development
      PORT: 3001
      # Supabase Configuration
      SUPABASE_URL: ${SUPABASE_URL:-https://ttyezboapfpyvlyxiqjw.supabase.co}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0eWV6Ym9hcGZweXZseXhpcWp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc0NTQ3NzIsImV4cCI6MjA3MzAzMDc3Mn0.BX8WjVExYR0W5NhMGLumIaoYh4dvD2bl_ItZVQIWTfE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-key}
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:41307
      LOG_LEVEL: debug
      # Modal Configuration
      LLM_PROVIDER: ${LLM_PROVIDER:-modal}
      MODAL_ENDPOINT_URL: ${MODAL_ENDPOINT_URL:-https://cavaloni--carbon-aware-modal-app-asgi-app.modal.run}
      MODAL_API_KEY: ${MODAL_API_KEY}
      MODAL_TOKEN_ID: ${MODAL_TOKEN_ID}
      MODAL_TOKEN_SECRET: ${MODAL_TOKEN_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    ports:
      - 3001:3001
    volumes:
      - ./packages/backend/src:/app/src:ro
      - ./packages/backend/scripts:/app/scripts:ro
      - ./packages/backend/package.json:/app/package.json:ro
      - ./packages/backend/tsconfig.json:/app/tsconfig.json:ro
      - ./modal:/app/modal:ro
      # Preserve node_modules from container (don't override with host)
      - backend_node_modules:/app/node_modules
      - ${HOME}/.modal.toml:/root/.modal.toml:ro
    networks:
      - carbon-aware-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile.dev
    container_name: carbon-aware-frontend-dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: 127.0.0.1:3001
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_MODAL_ENDPOINT_URL: https://cavaloni--carbon-aware-modal-app-asgi-app.modal.run
      NEXT_PUBLIC_DISABLE_AUTH: ${NEXT_PUBLIC_DISABLE_AUTH:-true}
      FORCE_AUTH: ${FORCE_AUTH:-false}
    ports:
      - "3000:3000"
    volumes:
      - ./packages/frontend/src:/app/src:ro
      - ./packages/frontend/public:/app/public:ro
      - ./packages/frontend/package.json:/app/package.json:ro
      - ./packages/frontend/next.config.js:/app/next.config.js:ro
      - ./packages/frontend/tailwind.config.js:/app/tailwind.config.js:ro
      - ./packages/frontend/postcss.config.js:/app/postcss.config.js:ro
      - ./packages/frontend/tsconfig.json:/app/tsconfig.json:ro
    networks:
      - carbon-aware-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  carbon-aware-network:
    driver: bridge
    name: carbon-aware-network

volumes:
  redis_data_dev:
    name: carbon-aware-redis-data-dev
  backend_node_modules:
    name: carbon-aware-backend-node-modules
