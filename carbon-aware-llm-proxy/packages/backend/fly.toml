app = "airth-carbon-aware-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  # Increase Modal provider timeout to avoid 30s client aborts in production
  MODAL_TIMEOUT_MS = "120000"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  # Keep one machine warm to reduce websocket cold starts
  min_machines_running = 1


