app = "airth-carbon-aware-backend"
primary_region = "iad"

[build]
  # Build from monorepo root so Dockerfile can access root Yarn files
  context = "../.."
  dockerfile = "packages/backend/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  # Increase Modal provider timeout to avoid 30s client aborts in production
  MODAL_TIMEOUT_MS = "120000"
  # CORS configuration for production
  CORS_ORIGINS = "https://routly-main.vercel.app,http://localhost:3000,http://127.0.0.1:3000"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  # Keep one machine warm to reduce websocket cold starts
  min_machines_running = 1
