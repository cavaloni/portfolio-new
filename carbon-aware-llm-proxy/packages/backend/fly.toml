app = "airth-carbon-aware-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  # Ensure the Docker build context is the backend package directory,
  # even when flyctl deploy is run from the repo root in CI.
  context = "."

[env]
  NODE_ENV = "production"
  PORT = "3001"
  # Increase Modal provider timeout to avoid 30s client aborts in production
  MODAL_TIMEOUT_MS = "120000"
  # CORS configuration for production
  CORS_ORIGINS = "https://routly-main.vercel.app,http://localhost:3000,http://127.0.0.1:3000"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  # Keep one machine warm to reduce websocket cold starts
  min_machines_running = 1

