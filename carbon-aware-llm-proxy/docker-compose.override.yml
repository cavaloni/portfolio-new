# Docker Compose Override for Development with Database Dashboards
# This file enables database admin tools for development

services:
  # Backend customizations
  backend:
    # Override environment variables
    environment:
      LOG_LEVEL: debug
      # Supabase Configuration
      SUPABASE_URL: ${SUPABASE_URL:-https://ttyezboapfpyvlyxiqjw.supabase.co}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0eWV6Ym9hcGZweXZseXhpcWp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc0NTQ3NzIsImV4cCI6MjA3MzAzMDc3Mn0.BX8WjVExYR0W5NhMGLumIaoYh4dvD2bl_ItZVQIWTfE}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0eWV6Ym9hcGZweXZseXhpcWp3Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc1NzQ1NDc3MiwiZXhwIjoyMDczMDMwNzcyfQ.example}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001}
      WATT_TIME_EMAIL: ${WATT_TIME_EMAIL}
      WATT_TIME_API_KEY: ${WATT_TIME_API_KEY}
      ELECTRICITY_MAP_API_KEY: ${ELECTRICITY_MAP_API_KEY}
      MODAL_TOKEN_ID: ${MODAL_TOKEN_ID}
      MODAL_TOKEN_SECRET: ${MODAL_TOKEN_SECRET}
      # Modal Configuration
      LLM_PROVIDER: ${LLM_PROVIDER:-modal}
      MODAL_ENDPOINT_URL: ${MODAL_ENDPOINT_URL}
      MODAL_API_KEY: ${MODAL_API_KEY}
      # HuggingFace Configuration
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN}
      # Mock routing flag (optional). Enable by running:
      #   ROUTING_MOCK_ENABLED=true docker compose ... up -d
      # Force mock routing in dev to avoid DB dependency while we fix DB config
      ROUTING_MOCK_ENABLED: ${ROUTING_MOCK_ENABLED:-false}
      # Mock authentication flag (separate from routing)
      MOCK_AUTH: ${MOCK_AUTH:-false}
      # Anonymous user credits configuration
      ANONYMOUS_FREE_CREDITS: ${ANONYMOUS_FREE_CREDITS:-5}
      FREE_PROMPTS_WINDOW_SEC: ${FREE_PROMPTS_WINDOW_SEC:-86400}
      # OpenRouter API Key (required when ROUTING_MOCK_ENABLED=true)
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      # Add your custom environment variables here
    
    # Add additional volumes for development
    volumes:
      - ./packages/backend/src:/app/src:ro
      - ./packages/backend/scripts:/app/scripts:ro
      - ./packages/backend/package.json:/app/package.json:ro
      - ./packages/backend/tsconfig.json:/app/tsconfig.json:ro
      - ./modal:/app/modal:ro
      - ${HOME}/.modal.toml:/root/.modal.toml:ro
      # Add more volumes as needed
    
    # Override ports if needed
    # ports:
    #   - "3002:3001"  # Map to different host port

  # Frontend customizations
  frontend:
    # Override environment variables
    environment:
      # Add your custom environment variables here
      NEXT_PUBLIC_DEBUG: "true"
    
    # Add additional volumes for development
    volumes:
      - ./packages/frontend/src:/app/src:ro
      - ./packages/frontend/public:/app/public:ro
      - ./packages/frontend/package.json:/app/package.json:ro
      - ./packages/frontend/next.config.js:/app/next.config.js:ro
      - ./packages/frontend/tailwind.config.js:/app/tailwind.config.js:ro
      - ./packages/frontend/postcss.config.js:/app/postcss.config.js:ro
      - ./packages/frontend/tsconfig.json:/app/tsconfig.json:ro
      # Add more volumes as needed
    
    # Override ports if needed
    # ports:
    #   - "3001:3000"  # Map to different host port



  # Redis customizations
  redis:
    # Add custom Redis configuration
    # command: redis-server --appendonly yes --maxmemory 128mb
    
    # Expose Redis port for external tools
    ports:
      - "6380:6379"  # Map to different host port to avoid conflicts



  # Redis admin tool - Redis Commander
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: carbon-aware-redis-commander-dev
    environment:
      REDIS_HOSTS: local:redis:6379
      HTTP_USER: admin
      HTTP_PASSWORD: admin123
    ports:
      - "8081:8081"
    networks:
      - carbon-aware-network
    depends_on:
      - redis
    restart: unless-stopped

# You can also override networks and volumes if needed
networks:
  carbon-aware-network:
    driver: bridge

volumes:
  redis_data_dev:
