# Mock deploy stage (actually deploys app with mock routing enabled)
mock_deploy:
  stage: deploy
  image: node:20-alpine
  variables:
    ROUTING_MOCK_ENABLED: "true"  # Enable backend mock routing mode
    NEXT_PUBLIC_DISABLE_AUTH: "true"  # Disable authentication for mock mode
  before_script:
    - apk add --no-cache git curl yarn
    - curl -L https://fly.io/install.sh | sh
    - export FLYCTL_INSTALL="/root/.fly"
    - export PATH="$FLYCTL_INSTALL/bin:$PATH"
    - echo "🎭 Deploying with Mock Routing Mode ROUTING_MOCK_ENABLED=$ROUTING_MOCK_ENABLED"
    - echo "🔓 Auth Disabled NEXT_PUBLIC_DISABLE_AUTH=$NEXT_PUBLIC_DISABLE_AUTH"
  script:
    - echo "🚀 Starting mock deployment to staging environment..."
    - cd carbon-aware-llm-proxy/packages/backend
    - echo "Deploying backend with mock routing enabled..."
    - flyctl deploy --remote-only
    - echo "✅ Mock deployment completed successfully!"
    - echo "🎭 App deployed with mock routing mode active"
    - echo "🔓 Authentication disabled for development/testing"
  environment:
    name: staging
  only:
    - main
    - develop
    - merge_requests
  dependencies:
    - migrate
  allow_failure: true

# Production deploy stage (manual trigger for safety)
deploy_production:
  stage: deploy
  image: node:20-alpine
  before_script:
    - apk add --no-cache git curl yarn
    - curl -L https://fly.io/install.sh | sh
    - export FLYCTL_INSTALL="/root/.fly"
    - export PATH="$FLYCTL_INSTALL/bin:$PATH"
  script:
    - echo "🚀 Production Deployment Starting..."
    - cd carbon-aware-llm-proxy/packages/backend
    - echo "Deploying to production environment..."
    - flyctl deploy --remote-only
    - echo "✅ Production deployment completed successfully!"
  environment:
    name: production
  only:
    - main
  dependencies:
    - migrate
  when: manual  # Require manual trigger for safety

# Deploy stage (automatic for development branches)
deploy:
  stage: deploy
  image: node:20-alpine
  variables:
    ROUTING_MOCK_ENABLED: "${ROUTING_MOCK_ENABLED:-false}"  # Default to false, can be overridden
    NEXT_PUBLIC_DISABLE_AUTH: "${NEXT_PUBLIC_DISABLE_AUTH:-false}"  # Default to false, can be overridden
  before_script:
    - apk add --no-cache git curl yarn
    - curl -L https://fly.io/install.sh | sh
    - export FLYCTL_INSTALL="/root/.fly"
    - export PATH="$FLYCTL_INSTALL/bin:$PATH"
    - echo "🎭 Routing Mock Mode $ROUTING_MOCK_ENABLED"
    - echo "🔓 Auth Disabled $NEXT_PUBLIC_DISABLE_AUTH"
  script:
    - cd carbon-aware-llm-proxy/packages/backend
    - flyctl deploy --remote-only
  environment:
    name: staging
  only:
    - develop
  dependencies:
    - migrate
  allow_failure: true

# Troubleshooting job (run on demand)
troubleshoot:
  stage: test
  image: node:20-alpine
  services:
    - postgres:15-alpine
  variables:
    POSTGRES_DB: $DB_NAME
    POSTGRES_USER: $DB_USERNAME
    POSTGRES_PASSWORD: $DB_PASSWORD
  before_script:
    - apk add --no-cache git postgresql-client dnsutils curl
    - cd carbon-aware-llm-proxy/packages/backend
    - npm ci
  script:
    # DNS resolution test
    - echo "Testing DNS resolution..."
    - nslookup postgres || echo "DNS lookup failed for postgres"
    - nslookup google.com || echo "DNS lookup failed for google.com"

    # Database connectivity test
    - echo "Testing database connectivity..."
    - PGPASSWORD=$DB_PASSWORD psql -h postgres -U $DB_USERNAME -d $DB_NAME -c "SELECT version();" || echo "Database connection failed"

    # Environment variables check
    - echo "Environment variables:"
    - echo "DB_HOST $DB_HOST"
    - echo "DB_PORT $DB_PORT"
    - echo "DB_USERNAME $DB_USERNAME"
    - echo "DB_NAME $DB_NAME"
    - echo "DATABASE_URL $DATABASE_URL"

    # Network connectivity test
    - echo "Testing network connectivity..."
    - ping -c 3 postgres || echo "Cannot ping postgres service"
    - curl -I https://www.google.com || echo "Cannot reach internet"
  when: manual
  allow_failure: true