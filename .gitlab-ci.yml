# GitLab CI/CD Pipeline Configuration
# This configuration addresses the ENOTFOUND DNS resolution error during migrations

stages:
  - build
  - test
  - migrate
  - deploy

variables:
  # Docker settings
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_DRIVER: overlay2

  # Node.js settings
  NODE_ENV: "production"

  # Database settings for CI
  # Use a PostgreSQL service or external database
  DB_HOST: "postgres"  # For local PostgreSQL service
  DB_PORT: "5432"
  DB_USERNAME: "postgres"
  DB_PASSWORD: "postgres"
  DB_NAME: "carbon_aware_llm"
  DB_SSL: "false"

  # Alternative: Use DATABASE_URL for managed databases
  # DATABASE_URL: "postgresql://user:password@host:port/database?sslmode=require"

  # Mock/Development variables (can be overridden in GitLab CI variables)
  ROUTING_MOCK_ENABLED: "false"  # Enable mock routing mode for development/testing
  NEXT_PUBLIC_DISABLE_AUTH: "false"  # Disable authentication for development"

# PostgreSQL service for CI (Option 1: Local database)
# Uncomment this section if you want to use a local PostgreSQL instance
# services:
#   - postgres:15-alpineFix 

#   variables:
#     POSTGRES_DB: $DB_NAME
#     POSTGRES_USER: $DB_USERNAME
#     POSTGRES_PASSWORD: $DB_PASSWORD

# Build stage
build:
  stage: build
  image: node:20-alpine
  before_script:
    - apk add --no-cache git
    - cd carbon-aware-llm-proxy
    - yarn install --frozen-lockfile
    - cd packages/backend
  script:
    - yarn build
  artifacts:
    paths:
      - carbon-aware-llm-proxy/packages/backend/dist/
    expire_in: 1 hour
  only:
    - main
    - develop

# Test stage
test:
  stage: test
  image: node:20-alpine
  services:
    - postgres:15-alpine
  variables:
    POSTGRES_DB: $DB_NAME
    POSTGRES_USER: $DB_USERNAME
    POSTGRES_PASSWORD: $DB_PASSWORD
  before_script:
    - apk add --no-cache git postgresql-client
    - cd carbon-aware-llm-proxy
    - yarn install --frozen-lockfile
    - cd packages/backend
 
  only:
    - main
    - develop
    - merge_requests

# Migration stage
migrate:
  stage: migrate
  image: node:20-alpine
  services:
    - postgres:15-alpine
  variables:
    POSTGRES_DB: $DB_NAME
    POSTGRES_USER: $DB_USERNAME
    POSTGRES_PASSWORD: $DB_PASSWORD
  before_script:
    - apk add --no-cache git postgresql-client
    - cd carbon-aware-llm-proxy
    - yarn install --frozen-lockfile
    - cd packages/backend

    # Wait for PostgreSQL to be ready
    - |
      for i in {1..30}; do
        if pg_isready -h postgres -U $DB_USERNAME -d $DB_NAME; then
          echo "PostgreSQL is ready!"
          break
        fi
        echo "Waiting for PostgreSQL... ($i/30)"
        sleep 2
      done

    # Run database migrations using enhanced script
    - ../../scripts/migrate-with-retry.sh
  script:
    - echo "Migration completed successfully"
  only:
    - main
    - develop
  dependencies:
    - build

# Alternative migration job using DATABASE_URL (Option 2: External database)
# Uncomment and modify this if using an external database service
