# GitLab CI/CD Pipeline Configuration
# This configuration addresses the ENOTFOUND DNS resolution error during migrations

stages:
  - build
  - test
  - migrate
  - deploy

variables:
  # Docker settings
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_DRIVER: overlay2

  # Node.js settings
  NODE_ENV: "production"

  # Database settings for CI
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USERNAME: "postgres"
  DB_PASSWORD: "postgres"
  DB_NAME: "carbon_aware_llm"
  DB_SSL: "false"

# Build stage
build:
  stage: build
  image: node:20-alpine
  before_script:
    - apk add --no-cache git
    - cd carbon-aware-llm-proxy/packages/backend
    - npm ci --only=production
  script:
    - npm run build
  artifacts:
    paths:
      - carbon-aware-llm-proxy/packages/backend/dist/
    expire_in: 1 hour
  only:
    - main
    - develop

# Test stage
test:
  stage: test
  image: node:20-alpine
  services:
    - postgres:15-alpine
  variables:
    POSTGRES_DB: $DB_NAME
    POSTGRES_USER: $DB_USERNAME
    POSTGRES_PASSWORD: $DB_PASSWORD
  before_script:
    - apk add --no-cache git postgresql-client
    - cd carbon-aware-llm-proxy/packages/backend
    - npm ci
  script:
    - echo "CI/CD is working!"
    - echo "Current branch $CI_COMMIT_BRANCH"
    - echo "Commit SHA $CI_COMMIT_SHA"
    - echo "Project $CI_PROJECT_NAME"
    - npm run lint
    - npm test
  only:
    - main
    - develop
    - merge_requests

# Migration stage
migrate_production:
  stage: migrate
  rules:
    - if: 
'$CI_COMMIT_REF_NAME == "main"'
      when: manual
      allow_failure: false
  image: node:20-alpine
  services:
    - postgres:15-alpine
  variables:
    POSTGRES_DB: $DB_NAME
    POSTGRES_USER: $DB_USERNAME
    POSTGRES_PASSWORD: $DB_PASSWORD
  before_script:
    # The retry script needs bash
    - apk add --no-cache bash
    # The retry script installs dependencies, but we need yarn available
    - cd carbon-aware-llm-proxy
    - corepack enable
    - yarn --version
    - yarn install --immutable
    - cd ..
  script:
    - echo "Running production database migrations..."
    - bash scripts/migrate-with-retry.sh

deploy_modal_production:
  stage: deploy
  rules:
    - if: 
'$CI_COMMIT_REF_NAME == "main"'
      when: manual
      allow_failure: false
  image: python:3.10
  variables:
    NODE_ENV: production
  needs:
    - migrate_production
  before_script:
    - apt-get update && apt-get install -y curl
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash - 
    - apt-get install -y nodejs
    - pip install modal
    - cd carbon-aware-llm-proxy
    - corepack enable
    - yarn --version
    - yarn install --immutable
  script:
    - echo "Deploying Modal workers to production..."
    - test -n "$DATABASE_URL" || (echo "❌ DATABASE_URL not set" && exit 1)
    - test -n "$MODAL_API_KEY" || (echo "❌ MODAL_API_KEY not set" && exit 1)
    - yarn workspace @carbon-aware-llm/backend deploy:modal
    - echo "✅ Modal deployment completed successfully"

# Shared configuration for Fly.io deployments
.flyctl_setup: &flyctl_setup
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl bash ca-certificates jq
    - curl -L https://fly.io/install.sh | FLYCTL_INSTALL=/usr/local bash
    - export FLYCTL_INSTALL=/usr/local
    - export PATH="/usr/local/bin:$PATH"
    - flyctl version

# Deploy stage (example for Fly.io)
deploy_backend_prod:
  stage: deploy
  rules:
    - if: 
'$CI_COMMIT_REF_NAME == "main"'
      when: manual
      allow_failure: false
  needs:
    - migrate_production
  variables:
    FLY_APP: "$FLY_APP_NAME"
  <<: *flyctl_setup
  script:
    - test -n "$FLY_API_TOKEN" || { echo "FLY_API_TOKEN is required"; exit 1; }
    - test -n "$FLY_APP_NAME" || { echo "FLY_APP_NAME is required"; exit 1; }
    - echo "Logging into Fly.io"
    - flyctl auth token "$FLY_API_TOKEN"
    # Ensure we do NOT override CORS via secrets; rely on fly.toml
    - flyctl secrets unset CORS_ORIGINS --app "$FLY_APP" --yes || true
    - |
      flyctl secrets set \
        NODE_ENV=production \
        PORT=3001 \
        JWT_SECRET="$JWT_SECRET" \
        ${REDIS_URL:+REDIS_URL="$REDIS_URL"} \
        ${DB_HOST:+DB_HOST="$DB_HOST"} \
        ${DB_PORT:+DB_PORT="$DB_PORT"} \
        ${DB_USERNAME:+DB_USERNAME="$DB_USERNAME"} \
        DB_PASSWORD="$DB_PASSWORD" \
        ${DB_NAME:+DB_NAME="$DB_NAME"} \
        LLM_PROVIDER="${LLM_PROVIDER:-modal}" \
        MODAL_ENDPOINT_URL="$MODAL_ENDPOINT_URL" \
        MODAL_API_KEY="$MODAL_API_KEY" \
        ROUTING_MOCK_ENABLED=false \
        --app "$FLY_APP" --stage
    - echo "Deploying backend to Fly app $FLY_APP"
    - cd carbon-aware-llm-proxy/packages/backend
    - flyctl deploy --app "$FLY_APP" --remote-only
  environment:
    name: production

deploy_backend_mock:
  stage: deploy
  rules:
    - if: 
'$CI_COMMIT_REF_NAME == "main"'
      when: manual
      allow_failure: false
  needs:
    - migrate_production
  variables:
    FLY_APP: "$FLY_APP_NAME"
  <<: *flyctl_setup
  script:
    - test -n "$FLY_API_TOKEN" || { echo "FLY_API_TOKEN is required"; exit 1; }
    - test -n "$FLY_APP_NAME" || { echo "FLY_APP_NAME is required"; exit 1; }
    - test -n "$OPENROUTER_API_KEY" || { echo "OPENROUTER_API_KEY is required for mock mode"; exit 1; }
    - echo "Logging into Fly.io"
    - flyctl auth token "$FLY_API_TOKEN"
    # Ensure we do NOT override CORS via secrets; rely on fly.toml
    - flyctl secrets unset CORS_ORIGINS --app "$FLY_APP" --yes || true
    # Set/refresh mock-mode secrets. This switches routing + chat to mock path.
    - |
      flyctl secrets set \
        NODE_ENV=production \
        PORT=3001 \
        ROUTING_MOCK_ENABLED=true \
        OPENROUTER_API_KEY="$OPENROUTER_API_KEY" \
        JWT_SECRET="$JWT_SECRET" \
        ${REDIS_URL:+REDIS_URL="$REDIS_URL"} \
        ${DB_HOST:+DB_HOST="$DB_HOST"} \
        ${DB_PORT:+DB_PORT="$DB_PORT"} \
        ${DB_USERNAME:+DB_USERNAME="$DB_USERNAME"} \
        DB_PASSWORD="$DB_PASSWORD" \
        ${DB_NAME:+DB_NAME="$DB_NAME"} \
        LLM_PROVIDER="${LLM_PROVIDER:-modal}" \
        MODAL_ENDPOINT_URL="${MODAL_ENDPOINT_URL}" \
        MODAL_API_KEY="${MODAL_API_KEY}" \
        --app "$FLY_APP" --stage
    - echo "Deploying backend (mock mode) to Fly app $FLY_APP"
    - cd carbon-aware-llm-proxy/packages/backend
    - flyctl deploy --app "$FLY_APP" --detach

# Troubleshooting job (run on demand)
troubleshoot:
  stage: test
  image: node:20-alpine
  services:
    - postgres:15-alpine
  variables:
    POSTGRES_DB: $DB_NAME
    POSTGRES_USER: $DB_USERNAME
    POSTGRES_PASSWORD: $DB_PASSWORD
  before_script:
    - apk add --no-cache git postgresql-client dnsutils curl
    - cd carbon-aware-llm-proxy/packages/backend
    - npm ci
  script:
    # DNS resolution test
    - echo "Testing DNS resolution..."
    - nslookup postgres || echo "DNS lookup failed for postgres"
    - nslookup google.com || echo "DNS lookup failed for google.com"

    # Database connectivity test
    - echo "Testing database connectivity..."
    - PGPASSWORD=$DB_PASSWORD psql -h postgres -U $DB_USERNAME -d $DB_NAME -c "SELECT version();" || echo "Database connection failed"

    # Environment variables check
    - echo "Environment variables:"
    - echo "DB_HOST: $DB_HOST"
    - echo "DB_PORT: $DB_PORT"
    - echo "DB_USERNAME: $DB_USERNAME"
    - echo "DB_NAME: $DB_NAME"
    - echo "DATABASE_URL: $DATABASE_URL"

    # Network connectivity test
    - echo "Testing network connectivity..."
    - ping -c 3 postgres || echo "Cannot ping postgres service"
    - curl -I https://www.google.com || echo "Cannot reach internet"
  when: manual
  allow_failure: true
